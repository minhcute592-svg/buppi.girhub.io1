<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu mẫu thanh toán</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .payment-form {
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ccc;
            width: 350px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .payment-form h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .radio-group {
            margin-bottom: 20px;
        }

        .radio-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #999;
            border-radius: 4px;
            box-sizing: border-box; /* Giúp padding không làm tràn chiều rộng */
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .input-group {
            flex: 1;
        }

        .btn-pay {
            background-color: #444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .btn-pay:hover {
            background-color: #222;
        }
    </style>
</head>
<body>

    <div class="payment-form">
        <h2>Phương thức thanh toán</h2>

        <div class="radio-group">
            <label>
                <input type="radio" name="payment" value="cash"> Tiền mặt
            </label>
            <label>
                <input type="radio" name="payment" value="card" checked> Thẻ debit hoặc credit
            </label>
        </div>

        <div class="input-group">
            <label for="card-name">Tên ghi trên thẻ:</label>
            <input type="text" id="card-name">
        </div>

        <div class="input-group">
            <label for="card-number">Số thẻ:</label>
            <input type="text" id="card-number">
        </div>

        <div class="row">
            <div class="input-group">
                <label for="expiry">Ngày hết hạn:</label>
                <input type="text" id="expiry">
            </div>
            <div class="input-group">
                <label for="cvv">CVV:</label>
                <input type="text" id="cvv">
            </div>
        </div>

        <button type="submit" class="btn-pay">Thanh toán</button>
    </div>

</body>
</html>
